<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Intelligent Food Recommendation System - Restaurant Dashboard{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        :root {
            --main-bg: #8cd39b;
            --main-bg2: #4bb38a;

            /* Dark mode variables */
            --dark-bg: #1e1e1e;
            --dark-card: #2c2c2c;
            --dark-text: #e3e3e3;
        }

        body {
            background: #f4f4f4;
            transition: .3s;
        }

        body.dark {
            background: var(--dark-bg);
            color: var(--dark-text);
        }

        /* HEADER */
        .admin-header {
            background: linear-gradient(45deg, var(--main-bg), var(--main-bg2));
            padding: 15px 30px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
			width:84%;
        }

        .admin-title {
            font-size: 22px;
            font-weight: bold;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: #fff;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            padding-top: 80px;
            border-left: 3px solid var(--main-bg2);
        }

        body.dark .sidebar {
            background: var(--dark-card);
            border-left-color: var(--main-bg2);
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: #333;
            font-size: 17px;
            text-decoration: none;
            transition: .2s;
        }

        body.dark .sidebar a {
            color: var(--dark-text);
        }

        .sidebar a:hover {
            background: var(--main-bg);
            color: white;
        }

        /* CONTENT */
        .content-container {
            margin-right: 270px;
            padding: 30px;
        }

        /* CARD STYLE */
        .card {
            border: none;
            border-top: 4px solid var(--main-bg2);
            transition: .3s;
        }

        body.dark .card {
            background: var(--dark-card);
            color: var(--dark-text);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        /* DARK MODE BUTTON */
        .dark-toggle {
            cursor: pointer;
            font-size: 20px;
            color: white;
        }

    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="admin-header">
        <div class="admin-title">
            <img src="/static/admin/img/logo.png" style="height:40px; margin-right:10px;"> Intelligent Food Recommendation System
        </div>

        <div>
            <span class="dark-toggle" onclick="toggleDarkMode()">🌙</span>
            <span class="ms-3">Welcome, {{ restaurant.name }}</span>
            <a href="{% url 'restaurant_logout' %}" class="text-white ms-3">Logout</a>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="{% url 'restaurant_dashboard' %}">🏠 Dashboard</a>
        <a href="{% url 'meals_list' %}">🍲 Meals</a>
        <a href="{% url 'meal_add' %}">➕ Add Meal</a>
        <a href="{% url 'restaurant_profile' %}">⚙️ Profile</a>
    </div>

    <!-- PAGE CONTENT -->
    <div class="content-container">
        {% block content %}
        {% endblock %}
    </div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle('dark');
}
</script>

</body>
</html>
