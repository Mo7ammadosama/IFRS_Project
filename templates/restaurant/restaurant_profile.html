{% extends 'restaurant/base.html' %}
{% block title %}Add Meal{% endblock %}

{% block content %}

<h2>Restaurant Profile</h2>

<form method="POST">
    {% csrf_token %}

    <div class="mb-3"><label>Name</label>
        <input name="name" class="form-control" value="{{ restaurant.name }}">
    </div>

    <div class="mb-3"><label>Email</label>
        <input name="email" class="form-control" value="{{ restaurant.email }}">
    </div>

    <div class="mb-3"><label>Phone</label>
        <input name="phone" class="form-control" value="{{ restaurant.phone }}">
    </div>

    <div class="mb-3"><label>Address</label>
        <input name="address" class="form-control" value="{{ restaurant.address }}">
    </div>

    <div class="mb-3"><label>Password</label>
        <input name="password" class="form-control" value="{{ restaurant.password }}">
    </div>

    <button class="btn btn-primary">Save Changes</button>
</form>

{% endblock %}
