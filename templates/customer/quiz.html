{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Intelligent Food Recommendation App - Mood Quiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --main-bg: #8cd39b;
            --main-bg2: #4bb38a;
        }

        body {
            background: #f3f6f4;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar-custom {
            background: linear-gradient(45deg, var(--main-bg), var(--main-bg2));
            padding: 12px;
        }

        .navbar-brand img {
            height: 45px;
        }

        .menu-btn {
            font-size: 26px;
            color: white;
            cursor: pointer;
        }

        /* Sidebar */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            top: 0;
            left: 0;
            background: white;
            box-shadow: 2px 0 12px rgba(0,0,0,0.2);
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
            z-index: 9999;
        }

        .sidebar a {
            padding: 15px 25px;
            display: block;
            font-size: 18px;
            color: #333;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #e8f6ec;
            color: #1d6f43;
        }

        /* Card Styles */
        .quiz-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .quiz-title {
            text-align: center;
            margin-bottom: 25px;
            color: #3d6a53;
            font-weight: bold;
        }

        .btn-main {
            background: var(--main-bg2);
            color: white;
            font-size: 18px;
        }

        .btn-main:hover {
            background: #3d966d;
        }
    </style>

    <script>
        function openMenu() {
            document.getElementById("sidebar").style.width = "260px";
        }
        function closeMenu() {
            document.getElementById("sidebar").style.width = "0";
        }
    </script>

</head>

<body>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
       <a onclick="closeMenu()" style="text-align:right; font-size:22px;">✖ Close</a>
		
		<center>
<img src="../../static/customer/img/logo.png" width="25%"/>	</center>
	   <a href="/customer/">🏠 Home</a>
        <a href="/customer/restaurants/">🍽 Restaurants</a>
        <a href="/customer/quiz/">🎯 Mood Quiz</a>
        <a href="/customer/logout/" style="color:red;">🔓 Logout</a>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-custom shadow d-flex justify-content-between align-items-center">
        <span class="menu-btn" onclick="openMenu()">☰</span>

        <center>
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="../../static/customer/img/logo.png" alt="Logo">
                <h6 class="ms-2 fw-bold text-white">Intelligent Food Recommendation App</h6>
            </a>
        </center>
    </nav>

    <div class="container mt-4">
        <h3 class="quiz-title">Mood Quiz 🎯</h3>

        <form method="POST">
            {% csrf_token %}

            <!-- Question Template -->
            <div class="quiz-card">
                <label class="fw-bold">1. Do you feel energetic today?</label><br>
                <input type="radio" name="q1" value="yes" required> Yes
                <input type="radio" name="q1" value="no"> No
            </div>

            <div class="quiz-card">
                <label class="fw-bold">2. Did you sleep well last night?</label><br>
                <input type="radio" name="q2" value="yes" required> Yes
                <input type="radio" name="q2" value="no"> No
            </div>

            <div class="quiz-card">
                <label class="fw-bold">3. Are you in a good mood?</label><br>
                <input type="radio" name="q3" value="yes" required> Yes
                <input type="radio" name="q3" value="no"> No
            </div>

            <div class="quiz-card">
                <label class="fw-bold">4. Are you feeling stressed?</label><br>
                <input type="radio" name="q4" value="yes" required> Yes
                <input type="radio" name="q4" value="no"> No
            </div>

            <div class="quiz-card">
                <label class="fw-bold">5. Do you feel hungry?</label><br>
                <input type="radio" name="q5" value="yes" required> Yes
                <input type="radio" name="q5" value="no"> No
            </div>

            <div class="quiz-card">
                <label class="fw-bold">6. Do you feel relaxed?</label><br>
                <input type="radio" name="q6" value="yes" required> Yes
                <input type="radio" name="q6" value="no"> No
            </div>

            <div class="quiz-card">
                <label class="fw-bold">7. Are you excited about your day?</label><br>
                <input type="radio" name="q7" value="yes" required> Yes
                <input type="radio" name="q7" value="no"> No
            </div>

            <button class="btn btn-main w-100 mt-3">Submit Quiz</button>
        </form>
    </div>

</body>
</html>
